<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de cadastro</title>
    <link rel="stylesheet" href="css/Cadastro.css">
</head>
<body>
     <div class="header">
    <div class="headr-container">
      <a href="index.html">
      <div class="logo">
        <img src="">
      </div>
      </a>
      <div class="acessos">
        <span><a href="index.html" class="inicio">Início ✈</a></span>
        <span><a href="login.html" class="login">Login ✈</a></span>
      </div>
    </div>
  </div>
    <div class="container">
<h1> ✈ Cadastre-se </h1><br>
✈ Insira o seu nome completo:<br>
<input type="text" id="input_nome" placeholder="Insira aqui"><br><br>
✈ Insira a sua idade: <br>
<input type="text" id="input_idade" placeholder="Insira aqui"><br><br>
✈ Insira o seu e-mail:<br>
<input type="text" id="input_email" placeholder="Insira aqui"><br><br>
✈ Insira a sua senha:<br>
<input type="text" id="input_senha" placeholder="Insira aqui"><br><br>
✈ Confirme a sua senha:<br>
<input type="text" id="input_senhaconfirma" placeholder="Confirme aqui"><br><br>
<button class="btn" onclick="cadastrar()">Cadastrar ✈</button>
</div>
<div id="div_mensagem"></div>
</body>
</html>
<script>

  function cadastrar() {
  

    let nomeVar = input_nome.value;
    let emailVar = input_email.value;
    let senhaVar = input_senha.value;
    let confirmacaoSenhaVar = input_senhaconfirma.value;

   
    
    if (!emailVar.includes('@')){
      alert('E-mail inválido!')
      return false;
    }

    
    let campos = [nomeVar, emailVar, senhaVar, confirmacaoSenhaVar];

    
    for (let i = 0; i < campos.length; i++) {
      if (campos[i] == "") {
        alert('Algum campo está vazio')
        return false;
      }
    }

    
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {
          cardErro.style.display = "block";

          mensagem_erro.innerHTML =
            "Cadastro realizado com sucesso! Redirecionando para tela de Login...";

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }
</script>
