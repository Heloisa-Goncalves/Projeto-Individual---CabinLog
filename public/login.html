<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de login</title>
    <link rel="stylesheet" href="css/login.css">    
</head>
<body>
    <div class="header">
    <div class="headr-container">
      <a href="index.html">
      <div class="logo">
        <img src="">
      </div>
      </a>
      <div class="acessos">
        <span><a href="index.html" class="inicio">Início ✈</a></span>
        <span><a href="Cadastro.html" class="cadastro">Cadastro ✈</a></span>
      </div>
    </div>
  </div>
  <div class="container">
    <h1>✈ Faça login no CabinLog</h1><br>
    ✈ Insira o seu E-mail:<br>
    <input type="text" id="input_email" placeholder="Insira aqui"><br><br>
    ✈ Insira a sua senha:<br>
    <input type="text" id="input_senha" placeholder="Insira aqui"><br><br>
    <button class="btn" onclick="entrar()">Entrar ✈</button>
    </div>
</body>
</html>
<script>
    function entrar() {
        
        var emailVar = input_email.value;
        var senhaVar = input_senha.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.idUsuario;
                    setTimeout(function () {
                        // window.location = "./dashboard/cards.html";
                        alert('login funcionou')
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
